name: Release

# Fires on every push to main. The prepare-release job decides whether a
# new version is warranted (conventional-commit-driven) and, if so, bumps
# package.json, tags the commit, and pushes both. The binary-release and
# npm-publish jobs gate on prepare-release.outputs.should_release.
#
# The tags: ['v*'] trigger is kept so a human can still cut an emergency
# release by pushing a tag by hand — prepare-release detects and passes
# that version through without re-bumping.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Single source of truth for the release version. Exits early
  # (should_release=false) when no feat/fix/breaking commit has landed
  # since the last tag, so chore/docs/ci-only merges do not spam npm.
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Checkout (full history for tag discovery)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide release + next version
        id: decide
        run: |
          set -euo pipefail

          # Path 1: hand-pushed tag — pass the tag version through verbatim.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
            echo "Triggered by tag push v$v — passing through."
            {
              echo "should_release=true"
              echo "version=$v"
              echo "needs_bump=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Path 2: push to main — scan commits for a conventional bump signal.
          last_tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then
            echo "Last release tag: $last_tag"
            range="$last_tag..HEAD"
          else
            echo "No previous v* tag; scanning full history."
            range=""
          fi

          # Drop release-bump commits so a previous chore(release): does not itself count.
          subjects=$(git log --format=%s --no-merges $range | grep -v '^chore(release):' || true)
          echo "---- commit subjects considered ----"
          echo "$subjects"
          echo "------------------------------------"

          bump=""
          if echo "$subjects" | grep -qE '(^|\n)[a-z]+(\([^)]+\))?!:|BREAKING CHANGE:'; then
            bump="major"
          elif echo "$subjects" | grep -qE '(^|\n)feat(\([^)]+\))?:'; then
            bump="minor"
          elif echo "$subjects" | grep -qE '(^|\n)fix(\([^)]+\))?:'; then
            bump="patch"
          fi

          if [ -z "$bump" ]; then
            echo "No feat/fix/breaking commits since ${last_tag:-<root>} — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current=$(node -p "require('./package.json').version")
          next=$(BUMP="$bump" CURRENT="$current" node -e '
            const [a, b, c] = process.env.CURRENT.split(".").map(Number);
            const bump = process.env.BUMP;
            if (bump === "major") console.log([a + 1, 0, 0].join("."));
            else if (bump === "minor") console.log([a, b + 1, 0].join("."));
            else console.log([a, b, c + 1].join("."));
          ')
          echo "Bumping $bump: $current -> $next"
          {
            echo "should_release=true"
            echo "version=$next"
            echo "needs_bump=true"
          } >> "$GITHUB_OUTPUT"

      # Bump package.json, commit, tag, push. GITHUB_TOKEN pushes do not
      # re-trigger this workflow by default, so no infinite loop. We push
      # main before the tag so the tagged commit is always reachable.
      - name: Bump, commit, tag, push
        if: steps.decide.outputs.needs_bump == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm version "${{ steps.decide.outputs.version }}" --no-git-tag-version --allow-same-version
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.decide.outputs.version }} [skip ci]"
          git tag "v${{ steps.decide.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.decide.outputs.version }}"

  # Compile TypeScript to a single standalone binary via Bun, per target.
  # Archives + SHA-256 checksums are uploaded to the GitHub release so the
  # curl one-liner in install.sh works without a Node runtime.
  binary-release:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - bun_target: bun-linux-x64
            archive_name: posthog-cli_Linux_x86_64
          - bun_target: bun-linux-arm64
            archive_name: posthog-cli_Linux_arm64
          - bun_target: bun-darwin-x64
            archive_name: posthog-cli_Darwin_x86_64
          - bun_target: bun-darwin-arm64
            archive_name: posthog-cli_Darwin_arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Compile single binary with Bun
        run: |
          bun build --compile --minify --sourcemap \
            --target=${{ matrix.bun_target }} \
            src/index.ts \
            --outfile posthog

      - name: Package archive + checksum
        run: |
          tar -czf "${{ matrix.archive_name }}.tar.gz" posthog LICENSE README.md
          sha256sum "${{ matrix.archive_name }}.tar.gz" > "${{ matrix.archive_name }}.tar.gz.sha256"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          files: |
            ${{ matrix.archive_name }}.tar.gz
            ${{ matrix.archive_name }}.tar.gz.sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish to npm via npm Trusted Publishers (OIDC). No NPM_TOKEN required.
  # One-time setup: npm package settings → Publishing access → GitHub Actions
  # trusted publisher for sapihav/posthog-cli / .github/workflows/release.yml.
  npm-publish:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.version }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

  # Publish a Homebrew formula to sapihav/homebrew-tap. Downloads the SHA256
  # sidecar files the binary-release job uploaded, templates Formula/posthog.rb
  # with the new version + per-arch hashes, and pushes to the tap repo.
  #
  # Requires TAP_GITHUB_TOKEN — a PAT with `contents: write` on
  # sapihav/homebrew-tap. GITHUB_TOKEN cannot reach across repos.
  #
  # Install after publish: `brew install sapihav/tap/posthog`.
  homebrew-publish:
    needs: [prepare-release, binary-release]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256 sums from the new release
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          base="https://github.com/sapihav/posthog-cli/releases/download/v${VERSION}"
          for asset in \
              posthog-cli_Darwin_arm64 posthog-cli_Darwin_x86_64 \
              posthog-cli_Linux_arm64 posthog-cli_Linux_x86_64; do
            # Retry a few times — the release asset index can lag by a few
            # seconds after the softprops upload step completes.
            for attempt in 1 2 3 4 5; do
              if curl -sSLfo "${asset}.tar.gz.sha256" "${base}/${asset}.tar.gz.sha256"; then
                break
              fi
              echo "Attempt $attempt: ${asset} not ready yet, retrying in 5s..."
              sleep 5
            done
          done

      - name: Extract raw SHAs
        id: shas
        run: |
          set -euo pipefail
          extract() { awk '{print $1}' "$1.tar.gz.sha256"; }
          {
            echo "darwin_arm64=$(extract posthog-cli_Darwin_arm64)"
            echo "darwin_x86_64=$(extract posthog-cli_Darwin_x86_64)"
            echo "linux_arm64=$(extract posthog-cli_Linux_arm64)"
            echo "linux_x86_64=$(extract posthog-cli_Linux_x86_64)"
          } >> "$GITHUB_OUTPUT"

      - name: Template Formula/posthog.rb
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.shas.outputs.darwin_arm64 }}
          SHA_DARWIN_X86_64: ${{ steps.shas.outputs.darwin_x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.shas.outputs.linux_arm64 }}
          SHA_LINUX_X86_64: ${{ steps.shas.outputs.linux_x86_64 }}
        run: |
          set -euo pipefail
          # Use a quoted heredoc delimiter for the Ruby body so shell does not
          # try to interpolate #{...}. We substitute the handful of placeholders
          # we actually need via sed afterwards.
          cat > posthog.rb <<'RUBY'
          class Posthog < Formula
            desc "Community-built CLI for PostHog (unofficial)"
            homepage "https://github.com/sapihav/posthog-cli"
            version "__VERSION__"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Darwin_arm64.tar.gz"
                sha256 "__SHA_DARWIN_ARM64__"
              end
              on_intel do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Darwin_x86_64.tar.gz"
                sha256 "__SHA_DARWIN_X86_64__"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Linux_arm64.tar.gz"
                sha256 "__SHA_LINUX_ARM64__"
              end
              on_intel do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Linux_x86_64.tar.gz"
                sha256 "__SHA_LINUX_X86_64__"
              end
            end

            def install
              bin.install "posthog"
            end

            test do
              assert_match(/posthog/i, shell_output("#{bin}/posthog --help"))
            end
          end
          RUBY
          sed -i \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__SHA_DARWIN_ARM64__|${SHA_DARWIN_ARM64}|g" \
            -e "s|__SHA_DARWIN_X86_64__|${SHA_DARWIN_X86_64}|g" \
            -e "s|__SHA_LINUX_ARM64__|${SHA_LINUX_ARM64}|g" \
            -e "s|__SHA_LINUX_X86_64__|${SHA_LINUX_X86_64}|g" \
            posthog.rb
          echo "---- generated posthog.rb ----"
          cat posthog.rb

      - name: Push formula to sapihav/homebrew-tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_GITHUB_TOKEN:-}" ]; then
            echo "::error::TAP_GITHUB_TOKEN secret is not set on this repo." \
                 "Add a PAT with contents: write on sapihav/homebrew-tap and retry."
            exit 1
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 \
            "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/sapihav/homebrew-tap.git" tap
          mkdir -p tap/Formula
          mv posthog.rb tap/Formula/posthog.rb
          cd tap
          git add Formula/posthog.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — skipping push."
            exit 0
          fi
          git commit -m "posthog ${VERSION}"
          git push origin HEAD
