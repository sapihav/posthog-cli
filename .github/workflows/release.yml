name: Release

# Tag-triggered release. Cut a release by pushing a tag from your machine:
#
#   git tag v0.3.0 && git push origin v0.3.0
#
# CI consumes the tag and publishes to npm, GitHub Releases, and the brew tap.
# CI never writes back to main — branch protection on main stays intact.
# Matches the workspace pattern used by exa-cli, perplexity-cli, tavily-cli,
# craft-cli (see `../CLI-tools-ROADMAP.md` and the sibling `release.yml` files).
#
# package.json's `version` field is treated as a placeholder. The git tag is
# the source of truth: each publish job re-syncs package.json to the tag in
# its own working tree (`npm version --no-git-tag-version`) before building,
# so no commit ever lands on main from CI.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the GitHub release once, up front, so the matrix-fanned-out
  # binary-release jobs only have to upload assets — they never race to
  # create. softprops/action-gh-release@v2 inside a 4-way matrix raced
  # on v0.2.1 and 2 of 4 jobs failed with
  #   {"resource":"Release","code":"already_exists","field":"tag_name"}
  # This serializes the create step.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping create."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi

  # Compile TypeScript to a single standalone binary via Bun, per target.
  # Archives + SHA-256 checksums are uploaded to the GitHub release so the
  # curl one-liner in install.sh works without a Node runtime.
  binary-release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - bun_target: bun-linux-x64
            archive_name: posthog-cli_Linux_x86_64
          - bun_target: bun-linux-arm64
            archive_name: posthog-cli_Linux_arm64
          - bun_target: bun-darwin-x64
            archive_name: posthog-cli_Darwin_x86_64
          - bun_target: bun-darwin-arm64
            archive_name: posthog-cli_Darwin_arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync package.json version to tag
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          echo "Syncing package.json version → $v"
          npm version "$v" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Compile single binary with Bun
        run: |
          bun build --compile --minify --sourcemap \
            --target=${{ matrix.bun_target }} \
            src/index.ts \
            --outfile posthog

      - name: Package archive + checksum
        run: |
          tar -czf "${{ matrix.archive_name }}.tar.gz" posthog LICENSE README.md
          sha256sum "${{ matrix.archive_name }}.tar.gz" > "${{ matrix.archive_name }}.tar.gz.sha256"

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            "${{ matrix.archive_name }}.tar.gz" \
            "${{ matrix.archive_name }}.tar.gz.sha256" \
            --clobber

  # Publish to npm via npm Trusted Publishers (OIDC). No NPM_TOKEN required.
  # One-time setup: npm package settings → Publishing access → GitHub Actions
  # trusted publisher for sapihav/posthog-cli / .github/workflows/release.yml.
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4

      # Node 24 ships with npm 11.x. We need npm >= 11.5.1 because npm
      # Trusted Publishers (OIDC) requires it — with older npm, sigstore
      # provenance signs (the GitHub OIDC JWT is recognised) but the
      # publish PUT goes out unauthenticated and the registry replies with
      # the misleading `404 'posthog-cli@X' is not in this registry`.
      # We intentionally use the bundled npm rather than self-upgrading
      # via `npm install -g npm@latest`: the 10→11 self-upgrade has a
      # known bug that leaves npm with a missing `promise-retry` module.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show npm version (must be >= 11.5.1 for OIDC publish)
        run: npm --version

      - name: Sync package.json version to tag
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          echo "Syncing package.json version → $v"
          npm version "$v" --no-git-tag-version --allow-same-version

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

  # Publish a Homebrew formula to sapihav/homebrew-tap. Downloads the SHA256
  # sidecar files the binary-release job uploaded, templates Formula/posthog.rb
  # with the new version + per-arch hashes, and pushes to the tap repo.
  #
  # Requires TAP_GITHUB_TOKEN — a PAT with `contents: write` on
  # sapihav/homebrew-tap. GITHUB_TOKEN cannot reach across repos.
  #
  # Install after publish: `brew install sapihav/tap/posthog`.
  homebrew-publish:
    needs: [binary-release]
    runs-on: ubuntu-latest
    steps:
      - name: Compute version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 sums from the new release
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          base="https://github.com/sapihav/posthog-cli/releases/download/v${VERSION}"
          for asset in \
              posthog-cli_Darwin_arm64 posthog-cli_Darwin_x86_64 \
              posthog-cli_Linux_arm64 posthog-cli_Linux_x86_64; do
            # Retry a few times — the release asset index can lag by a few
            # seconds after the softprops upload step completes.
            for attempt in 1 2 3 4 5; do
              if curl -sSLfo "${asset}.tar.gz.sha256" "${base}/${asset}.tar.gz.sha256"; then
                break
              fi
              echo "Attempt $attempt: ${asset} not ready yet, retrying in 5s..."
              sleep 5
            done
          done

      - name: Extract raw SHAs
        id: shas
        run: |
          set -euo pipefail
          extract() { awk '{print $1}' "$1.tar.gz.sha256"; }
          {
            echo "darwin_arm64=$(extract posthog-cli_Darwin_arm64)"
            echo "darwin_x86_64=$(extract posthog-cli_Darwin_x86_64)"
            echo "linux_arm64=$(extract posthog-cli_Linux_arm64)"
            echo "linux_x86_64=$(extract posthog-cli_Linux_x86_64)"
          } >> "$GITHUB_OUTPUT"

      - name: Template Formula/posthog.rb
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.shas.outputs.darwin_arm64 }}
          SHA_DARWIN_X86_64: ${{ steps.shas.outputs.darwin_x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.shas.outputs.linux_arm64 }}
          SHA_LINUX_X86_64: ${{ steps.shas.outputs.linux_x86_64 }}
        run: |
          set -euo pipefail
          # Use a quoted heredoc delimiter for the Ruby body so shell does not
          # try to interpolate #{...}. We substitute the handful of placeholders
          # we actually need via sed afterwards.
          cat > posthog.rb <<'RUBY'
          class Posthog < Formula
            desc "Community-built CLI for PostHog (unofficial)"
            homepage "https://github.com/sapihav/posthog-cli"
            version "__VERSION__"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Darwin_arm64.tar.gz"
                sha256 "__SHA_DARWIN_ARM64__"
              end
              on_intel do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Darwin_x86_64.tar.gz"
                sha256 "__SHA_DARWIN_X86_64__"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Linux_arm64.tar.gz"
                sha256 "__SHA_LINUX_ARM64__"
              end
              on_intel do
                url "https://github.com/sapihav/posthog-cli/releases/download/v#{version}/posthog-cli_Linux_x86_64.tar.gz"
                sha256 "__SHA_LINUX_X86_64__"
              end
            end

            def install
              bin.install "posthog"
            end

            test do
              assert_match(/posthog/i, shell_output("#{bin}/posthog --help"))
            end
          end
          RUBY
          sed -i \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__SHA_DARWIN_ARM64__|${SHA_DARWIN_ARM64}|g" \
            -e "s|__SHA_DARWIN_X86_64__|${SHA_DARWIN_X86_64}|g" \
            -e "s|__SHA_LINUX_ARM64__|${SHA_LINUX_ARM64}|g" \
            -e "s|__SHA_LINUX_X86_64__|${SHA_LINUX_X86_64}|g" \
            posthog.rb
          echo "---- generated posthog.rb ----"
          cat posthog.rb

      - name: Push formula to sapihav/homebrew-tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_GITHUB_TOKEN:-}" ]; then
            echo "::error::TAP_GITHUB_TOKEN secret is not set on this repo." \
                 "Add a PAT with contents: write on sapihav/homebrew-tap and retry."
            exit 1
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 \
            "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/sapihav/homebrew-tap.git" tap
          mkdir -p tap/Formula
          mv posthog.rb tap/Formula/posthog.rb
          cd tap
          git add Formula/posthog.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — skipping push."
            exit 0
          fi
          git commit -m "posthog ${VERSION}"
          git push origin HEAD
